<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Generate Bill - StockGuard</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <h2 class="mb-4">Generate Bill</h2>

    <div class="card shadow-sm mb-5">
        <div class="card-body">

            <form th:action="@{/bills/generate}" method="post">

    <div id="items-container">

        <div class="row mb-3 item-row">

            <div class="col-md-4">
                <label class="form-label">Select Product</label>
                <select name="productId"
                        class="form-select product-select"
                        onchange="updateRow(this)"
                        required>

                    <option value="" disabled selected>
                        Choose product
                    </option>

                    <option th:each="product : ${products}"
                            th:value="${product.id}"
                            th:data-price="${product.price}"
                            th:text="${product.name + ' (₹' + product.price + ') - Stock: ' + product.stock}">
                    </option>

                </select>
            </div>

            <div class="col-md-2">
                <label class="form-label">Quantity</label>
                <input type="number"
                       name="quantity"
                       min="1"
                       class="form-control quantity-input"
                       oninput="updateRow(this)"
                       required>
            </div>

            <div class="col-md-3">
                <label class="form-label">Item Total</label>
                <input type="text"
                       class="form-control item-total"
                       readonly>
            </div>

            <div class="col-md-2 d-flex align-items-end">
                <button type="button"
                        class="btn btn-danger remove-btn">
                    Remove
                </button>
            </div>

        </div>
    </div>

    <button type="button"
            class="btn btn-secondary mb-3"
            onclick="addRow()">
        + Add Product
    </button>

    <h5 class="text-end">
        Grand Total: ₹ <span id="grandTotal">0</span>
    </h5>

    <button type="submit"
            class="btn btn-primary mt-3">
        Generate Bill
    </button>

</form>

        </div>
    </div>

    <div th:if="${bill}" class="card shadow-lg">
        <div class="card-body">

            <h4>Bill Generated</h4>
            <hr>

            <p>
                <strong>Bill ID:</strong>
                <span th:text="${bill.id}"></span>
            </p>

            <p>
                <strong>Date:</strong>
                <span th:text="${#temporals.format(bill.billTime, 'yyyy-MM-dd HH:mm')}"></span>
            </p>

            <table class="table table-bordered mt-3">
                <thead class="table-dark">
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="item : ${bill.items}">
                    <td th:text="${item.productName}"></td>
                    <td th:text="${item.priceAtSale}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td th:text="${item.itemTotal}"></td>
                </tr>
                </tbody>
            </table>

            <h5 class="text-end">
                Total Amount:
                <span class="text-success"
                      th:text="${bill.totalAmount}">
                </span>
            </h5>

        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success"
     th:text="${successMessage}"></div>

<div th:if="${errorMessage}" class="alert alert-danger"
     th:text="${errorMessage}"></div>
</div>
<div class="card shadow-sm border-0">
        <div class="card-body">

            <h5 class="mb-3">Transaction History</h5>

            <div class="table-responsive">
                <table class="table table-bordered table-hover">

                    <thead class="table-dark">
                        <tr>
                            <th>Transaction Token</th>
                            <th>Status</th>
                            <th>Quantity</th>
                            <th>Timestamp</th>
                        </tr>
                    </thead>

                    <tbody>

                        <tr th:each="tx : ${transactions}">

                            <td th:text="${tx.token}"></td>

                            <td>
                                <span th:if="${tx.status == 'SUCCESS'}"
                                      class="badge bg-success">
                                    SUCCESS
                                </span>

                                <span th:if="${tx.status == 'FAILED'}"
                                      class="badge bg-danger">
                                    FAILED
                                </span>
                            </td>

                            <td th:text="${tx.tokenAmount}"></td>

                            <td th:text="${#temporals.format(tx.timestamp, 'yyyy-MM-dd HH:mm')}"></td>

                        </tr>

                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>
<script>
function updateRow(element) {

    const row = element.closest(".item-row");

    const productSelect = row.querySelector(".product-select");
    const quantityInput = row.querySelector(".quantity-input");
    const itemTotalField = row.querySelector(".item-total");

    const selectedOption = productSelect.options[productSelect.selectedIndex];
    const price = parseFloat(selectedOption.getAttribute("data-price")) || 0;
    const quantity = parseInt(quantityInput.value) || 0;

    const total = price * quantity;

    itemTotalField.value = total.toFixed(2);

    updateGrandTotal();
}

function updateGrandTotal() {
    const itemTotals = document.querySelectorAll(".item-total");
    let grandTotal = 0;

    itemTotals.forEach(input => {
        grandTotal += parseFloat(input.value) || 0;
    });

    document.getElementById("grandTotal").innerText = grandTotal.toFixed(2);
}

function addRow() {
    const container = document.getElementById("items-container");
    const firstRow = container.querySelector(".item-row");
    const newRow = firstRow.cloneNode(true);

    newRow.querySelector(".quantity-input").value = "";
    newRow.querySelector(".product-select").selectedIndex = 0;
    newRow.querySelector(".item-total").value = "";

    container.appendChild(newRow);
}

document.addEventListener("click", function(e) {
    if (e.target.classList.contains("remove-btn")) {
        const rows = document.querySelectorAll(".item-row");
        if (rows.length > 1) {
            e.target.closest(".item-row").remove();
            updateGrandTotal();
        }
    }
});
</script>

</body>
</html>
