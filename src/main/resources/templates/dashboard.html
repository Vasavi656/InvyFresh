<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard - StockGuard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <div class="mb-4">
        <h2 class="fw-bold">StockGuard Dashboard</h2>
        <p class="text-muted">Overview of your inventory system</p>
    </div>

    <div class="row g-4">

        <div class="col-md-3">
            <div class="card shadow-lg border-0 text-white bg-primary h-100">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <h6>Total Products</h6>
                        <h2 class="fw-bold" th:text="${totalProducts}">0</h2>
                    </div>
                    <i class="bi bi-box-seam display-5"></i>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-lg border-0 text-white bg-danger h-100">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <h6>Low Stock</h6>
                        <h2 class="fw-bold" th:text="${lowStock}">0</h2>
                    </div>
                    <i class="bi bi-exclamation-triangle display-5"></i>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-lg border-0 text-dark bg-warning h-100">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <h6>Near Expiry</h6>
                        <h2 class="fw-bold" th:text="${nearExpiry}">0</h2>
                    </div>
                    <i class="bi bi-clock-history display-5"></i>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-lg border-0 text-white bg-dark h-100">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <h6>Expired Items</h6>
                        <h2 class="fw-bold" th:text="${expiredProducts}">0</h2>
                    </div>
                    <i class="bi bi-x-circle display-5"></i>
                </div>
            </div>
        </div>

    </div>

    <div class="mt-5">
        <h5 class="mb-3">Quick Actions</h5>

        <div class="d-flex gap-3 flex-wrap">

            <a href="/products/new"
               class="btn btn-primary btn-lg shadow-sm">
                <i class="bi bi-plus-circle"></i> Add Product
            </a>

            <a href="/sales"
               class="btn btn-success btn-lg shadow-sm">
                <i class="bi bi-cart-plus"></i> Record Sale
            </a>

            <a href="/alerts"
               class="btn btn-warning btn-lg shadow-sm">
                <i class="bi bi-bell"></i> View Alerts
            </a>

        </div>
    </div>

</div>

</body>
</html>
