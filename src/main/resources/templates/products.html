<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Products - StockGuard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Products</h2>
        <a class="btn btn-primary" th:href="@{/products/new}">+ Add Product</a>
    </div>

    <div class="table-responsive">
        <table class="table table-bordered table-hover shadow-sm">

            <div class="row mb-3">

            <div class="col-md-6">
                <form th:action="@{/products}" method="get" class="d-flex">

                    <input type="text"
                        name="keyword"
                        th:value="${keyword}"
                        class="form-control me-2"
                        placeholder="Search by product name...">

                    <button class="btn btn-outline-primary">
                        Search
                    </button>

                </form>
            </div>

            <div class="col-md-6 text-end">
                <a class="btn btn-secondary"
                th:href="@{/products}">
                    Clear
                </a>
            </div>

        </div>
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Min Stock</th>
                    <th>Expiry Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="product, stat : ${products}">
                    
                    <td th:text="${stat.index + 1}"></td>
                    <td th:text="${product.name}"></td>
                    <td th:text="${product.category}"></td>
                    <td th:text="${product.price}"></td>
                    <td th:text="${product.stock}"></td>
                    <td th:text="${product.minStockLevel}"></td>
                    <td th:text="${product.expiryDate}"></td>

                    <td>

                        <span th:if="${product.stock <= product.minStockLevel}"
                            class="badge bg-danger">
                            Low Stock
                        </span>

                        <span th:if="${product.expiryDate != null 
                                    and product.expiryDate.isAfter(T(java.time.LocalDate).now()) 
                                    and product.expiryDate.isBefore(T(java.time.LocalDate).now().plusDays(7))}"
                            class="badge bg-warning text-dark">
                            Near Expiry
                        </span>

                        <span th:if="${product.expiryDate != null 
                                    and product.expiryDate.isBefore(T(java.time.LocalDate).now())}"
                            class="badge bg-dark">
                            Expired
                        </span>

                        <span th:if="${product.stock > product.minStockLevel 
                                    and (product.expiryDate == null 
                                    or product.expiryDate.isAfter(T(java.time.LocalDate).now().plusDays(7)))}"
                            class="badge bg-success">
                            OK
                        </span>

                    </td>

                    <td>
                        <a th:href="@{'/products/edit/' + ${product.id}}"
                        class="btn btn-sm btn-info text-white">
                            Edit
                        </a>

                        <a th:href="@{'/products/delete/' + ${product.id}}"
                        class="btn btn-sm btn-danger">
                            Delete
                        </a>
                    </td>

                </tr>
                </tbody>


        </table>
    </div>

</div>

</body>
</html>
