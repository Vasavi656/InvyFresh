<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Alerts - StockGuard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <h2>Alerts</h2>
    <p class="text-muted">Monitor low stock and expiry notifications</p>

    <div class="mb-4 d-flex gap-3">

        <a th:href="@{/alerts(filter='all')}"
           th:class="'btn ' + (${activeFilter}=='all' ? 'btn-dark' : 'btn-outline-dark')">
            All Alerts (<span th:text="${allCount}"></span>)
        </a>

        <a th:href="@{/alerts(filter='unread')}"
           th:class="'btn ' + (${activeFilter}=='unread' ? 'btn-primary' : 'btn-outline-primary')">
            Unread (<span th:text="${unreadCount}"></span>)
        </a>

        <a th:href="@{/alerts(filter='low')}"
           th:class="'btn ' + (${activeFilter}=='low' ? 'btn-danger' : 'btn-outline-danger')">
            Low Stock (<span th:text="${lowCount}"></span>)
        </a>

        <a th:href="@{/alerts(filter='expiry')}"
           th:class="'btn ' + (${activeFilter}=='expiry' ? 'btn-warning' : 'btn-outline-warning')">
            Expiring (<span th:text="${expiryCount}"></span>)
        </a>

    </div>

    <div th:if="${alerts.size() == 0}" class="alert alert-info">
        No alerts available.
    </div>

    <div th:each="alert : ${alerts}"
         class="card shadow-sm mb-3">

        <div class="card-body d-flex justify-content-between align-items-center">

            <div>

                <h5 th:text="${alert.productId}"></h5>

                <p class="mb-1">
                    <span th:if="${alert.type=='LOW_STOCK'}">
                        Stock level is below minimum threshold.
                    </span>
                    <span th:if="${alert.type=='EXPIRY'}">
                        Product expiring within 7 days.
                    </span>
                </p>

                <small class="text-muted"
                       th:text="${#temporals.format(alert.createdAt, 'yyyy-MM-dd HH:mm')}">
                </small>

            </div>

            <div class="text-end">

                <span th:if="${alert.type=='LOW_STOCK'}"
                      class="badge bg-danger">
                      Low Stock
                </span>

                <span th:if="${alert.type=='EXPIRY'}"
                      class="badge bg-warning text-dark">
                      Expiring
                </span>

                <span th:if="${!alert.read}"
                      class="badge bg-info">
                      New
                </span>

          <form th:action="@{/alerts/read/{id}(id=${alert.id})}"
      method="post"
      th:if="${!alert.read}">

    <button class="btn btn-sm btn-outline-secondary mt-2">
        Mark as Read
    </button>

</form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
