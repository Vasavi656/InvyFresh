<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sales - StockGuard</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Sales Management</h2>
    </div>

    <div th:if="${successMessage}"
         class="alert alert-success"
         th:text="${successMessage}">
    </div>

    <div th:if="${errorMessage}"
         class="alert alert-danger"
         th:text="${errorMessage}">
    </div>

    <div class="card shadow-lg border-0 mb-5">
        <div class="card-body p-4">

            <h5 class="mb-3">Record New Sale</h5>

            <form th:action="@{/sales/add}" method="post">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">
                            Select Product
                        </label>

                        <select name="productId"
                                class="form-select"
                                required>

                            <option value="" disabled selected>
                                Choose product
                            </option>

                            <option th:each="product : ${products}"
                                    th:value="${product.id}"
                                    th:text="${product.name + ' (Stock: ' + product.stock + ')'}">
                            </option>

                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">
                            Quantity
                        </label>

                        <input type="number"
                               name="quantity"
                               class="form-control"
                               min="1"
                               required>
                    </div>

                </div>

                <button type="submit" class="btn btn-primary px-4">
                    Process Sale
                </button>

            </form>

        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body">

            <h5 class="mb-3">Transaction History</h5>

            <div class="table-responsive">
                <table class="table table-bordered table-hover">

                    <thead class="table-dark">
                        <tr>
                            <th>Sale ID</th>
                            <th>Transaction Token</th>
                            <th>Status</th>
                            <th>Quantity</th>
                            <th>Timestamp</th>
                        </tr>
                    </thead>

                    <tbody>

                        <tr th:each="tx : ${transactions}">

                            <td th:text="${tx.saleId}"></td>

                            <td th:text="${tx.token}"></td>

                            <td>
                                <span th:if="${tx.status == 'SUCCESS'}"
                                      class="badge bg-success">
                                    SUCCESS
                                </span>

                                <span th:if="${tx.status == 'FAILED'}"
                                      class="badge bg-danger">
                                    FAILED
                                </span>
                            </td>

                            <td th:text="${tx.tokenAmount}"></td>

                            <td th:text="${#temporals.format(tx.timestamp, 'yyyy-MM-dd HH:mm')}"></td>

                        </tr>

                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>

</body>
</html>
