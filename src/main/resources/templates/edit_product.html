<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Product</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Edit Product</h2>
        <a th:href="@{/products}" class="btn btn-outline-secondary">
            ← Back
        </a>
    </div>

    <div class="card shadow-lg border-0">
        <div class="card-body p-4">

            <form th:action="@{/products/update/{id}(id=${product.id})}"
                  method="post">

                <input type="hidden"
                       name="id"
                       th:value="${product.id}" />

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Product Name</label>
                        <input type="text"
                               name="name"
                               th:value="${product.name}"
                               class="form-control"
                               required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Category</label>
                        <input type="text"
                               name="category"
                               th:value="${product.category}"
                               class="form-control"
                               required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-semibold">Price (₹)</label>
                        <input type="number"
                               step="0.01"
                               name="price"
                               th:value="${product.price}"
                               class="form-control"
                               required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-semibold">Stock</label>
                        <input type="number"
                               name="stock"
                               th:value="${product.stock}"
                               class="form-control"
                               required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-semibold">Minimum Stock</label>
                        <input type="number"
                               name="minStockLevel"
                               th:value="${product.minStockLevel}"
                               class="form-control"
                               required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Expiry Date</label>
                        <input type="date"
                               name="expiryDate"
                               th:value="${product.expiryDate}"
                               class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Created At</label>
                        <input type="text"
                               th:value="${product.createdAt}"
                               class="form-control"
                               readonly>
                    </div>

                </div>

                <button class="btn btn-success px-4">
                    Update Product
                </button>

                <a th:href="@{/products}"
                   class="btn btn-secondary ms-2 px-4">
                    Cancel
                </a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
